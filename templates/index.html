<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Invitation de Mariage</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* =========================
   GLOBAL
========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Playfair Display', serif;
    color:white;
    text-align:center;
    overflow-x:hidden;

    background: linear-gradient(
        135deg,
        rgba(255,215,0,0.08),
        rgba(255,255,255,0.05)
    );
}

/* gold ambient glow */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:radial-gradient(
        circle at center,
        rgba(255,215,0,0.12),
        transparent 60%
    );
    z-index:-1;
}

/* =========================
   BACKGROUND
========================= */

.bg{
    position:fixed;
    inset:0;
    background:url("https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&w=1600&q=80")
    center/cover no-repeat;
    z-index:-2;
}

.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.55);
    z-index:-1;
}

/* =========================
   START SCREEN
========================= */

#startScreen{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:10;
}

#startBtn{
    position:absolute;
    padding:18px 35px;
    border:none;
    border-radius:50px;
    cursor:pointer;
    font-size:18px;
    color:white;

    background:linear-gradient(45deg,#ff4d6d,#ffb3c1);
    box-shadow:0 0 25px rgba(255,77,109,0.8);

    transition:all 1s ease;
}

/* envelope */
#envelope{
    font-size:90px;
    transition:all 1s ease;
}

#envelope.open{
    transform:scale(2);
    opacity:0;
}

/* =========================
   CARD (GOLD FRAME)
========================= */

.card{
    display:none;

    max-width:850px;
    margin:40px auto;
    padding:40px;

    background:rgba(255,255,255,0.10);
    backdrop-filter:blur(14px);

    border:2px solid #ffd700; /* GOLD FRAME */

    border-radius:25px;

    box-shadow:
        0 0 25px rgba(255,215,0,0.45),
        0 0 70px rgba(255,215,0,0.25),
        0 0 120px rgba(255,215,0,0.10);

    opacity:0;
    transform:translateY(30px);
    transition:1.2s ease;
}

.card.show{
    opacity:1;
    transform:translateY(0);
}

/* =========================
   TITLE (PINK)
========================= */

h1{
    font-family:'Great Vibes', cursive;
    font-size:80px;
    color:#ff69b4; /* pink */
    text-shadow:0 0 20px rgba(255,105,180,0.5);
}

h2{
    font-size:28px;
    margin:10px 0;
}

/* =========================
   SMALL INCLINED HEART
========================= */

.ring{
    position:relative;
    width:70px;
    height:70px;
    margin:25px auto;

    transform:rotate(-25deg);
    animation:heartbeat 1.8s infinite;
}

/* heart shape */
.ring::before,
.ring::after{
    content:"";
    position:absolute;
    width:35px;
    height:55px;

    background:#ff69b4;

    border-radius:35px 35px 0 0;

    box-shadow:
        0 0 15px rgba(255,105,180,0.8),
        0 0 30px rgba(255,105,180,0.4);
}

.ring::before{
    left:35px;
    transform:rotate(-45deg);
    transform-origin:0 100%;
}

.ring::after{
    left:0;
    transform:rotate(45deg);
    transform-origin:100% 100%;
}

@keyframes heartbeat{
    0%{ transform:scale(1) rotate(-25deg); }
    50%{ transform:scale(1.12) rotate(-25deg); }
    100%{ transform:scale(1) rotate(-25deg); }
}

/* =========================
   EVENT TEXT
========================= */

.event-time{
    margin:20px 0;
    font-size:24px;
    color:#ffd700;
    font-weight:bold;
}

/* =========================
   BUTTONS
========================= */

.btn{
    display:inline-block;
    margin:10px;
    padding:14px 22px;
    border-radius:50px;
    text-decoration:none;
    font-weight:bold;
}

.location{
    background:#ffd700;
    color:black;
}

.rsvp{
    background:#ffb84d;
    color:black;
}

/* =========================
   FLOWERS
========================= */

.petal{
    position:fixed;
    top:-20px;
    font-size:18px;
    animation:fall linear infinite;
}

@keyframes fall{
    to{
        transform:translateY(110vh) rotate(360deg);
    }
}

/* =========================
   MOBILE
========================= */

@media(max-width:768px){

    h1{font-size:55px;}
    h2{font-size:22px;}

    .card{
        width:92%;
        padding:25px;
    }

    #startBtn{
        font-size:16px;
        padding:14px 25px;
    }

    .event-time{
        font-size:20px;
    }
}

</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<!-- START -->
<div id="startScreen">

    <div id="envelope">💌</div>

    <button id="startBtn">
        Ouvrir l’invitation 💍
    </button>

</div>

<!-- CARD -->
<div class="card" id="card">

    <h1>Invitation de Mariage</h1>

    <h2>Mohamed ❤️ Maryem</h2>

    <!-- SMALL PINK HEART -->
    <div class="ring"></div>

    <p style="font-size:22px;">
        ✨ Vous êtes chaleureusement invités ✨
    </p>

    <h2>📅 29 Décembre 2026</h2>

    <div id="countdown"></div>

    <div class="event-time">
        🕗 Début de la soirée : 20:00
    </div>

    <!-- LOCATION -->
    <a class="btn location"
       href="https://maps.google.com/?q=Bouraoui+Festival+Hall+Carthage"
       target="_blank">
       📍 Localisation
    </a>

    <!-- RSVP -->
    <a class="btn rsvp"
       href="https://docs.google.com/forms/d/e/1FAIpQLSd2NqUsF-L2Loc3kSUiZkRinkybHZgvTd-7pqks86YeWWSYDA/viewform"
       target="_blank">
       💌 Confirmer ma présence
    </a>

    <!-- MUSIC -->
    <audio id="music" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

</div>

<script>

/* BUTTON MOVE */
const startBtn = document.getElementById("startBtn");
const startScreen = document.getElementById("startScreen");
const card = document.getElementById("card");
const envelope = document.getElementById("envelope");
const music = document.getElementById("music");

function moveButton(){
    const maxX = window.innerWidth - startBtn.offsetWidth;
    const maxY = window.innerHeight - startBtn.offsetHeight;

    startBtn.style.left = Math.random()*maxX + "px";
    startBtn.style.top = Math.random()*maxY + "px";
}

setInterval(moveButton,1200);

/* OPEN */
function openInvitation(){

    music.volume = 0.6;
    music.play().catch(()=>{});

    envelope.classList.add("open");

    setTimeout(()=>{
        startScreen.style.display="none";
        card.style.display="block";

        setTimeout(()=>{
            card.classList.add("show");
        },100);

        startRoses();
        startCountdown();

    },800);
}

startBtn.addEventListener("click",openInvitation);

/* COUNTDOWN */
const weddingDate = new Date("December 29, 2026 20:00:00");

function startCountdown(){

    const el = document.getElementById("countdown");

    setInterval(()=>{

        const now = new Date();
        const diff = weddingDate - now;

        const days = Math.floor(diff / 86400000);

        el.innerHTML = `⏳ ${days} jours restants`;

    },1000);
}

/* FLOWERS */
function startRoses(){

    setInterval(()=>{

        const petal = document.createElement("div");
        petal.className="petal";
        petal.innerHTML="🌸";

        petal.style.left=Math.random()*100+"vw";
        petal.style.fontSize=(15+Math.random()*20)+"px";
        petal.style.animationDuration=(4+Math.random()*5)+"s";

        document.body.appendChild(petal);

        setTimeout(()=>petal.remove(),10000);

    },500);
}

</script>

</body>
</html>
